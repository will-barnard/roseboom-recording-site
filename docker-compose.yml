services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - JWT_SECRET=${JWT_SECRET:-change-this-secret-key-in-production}
      - JWT_EXPIRES_IN=7d
    volumes:
      - roseboom-data:/app/data
      - roseboom-uploads:/app/uploads
    restart: unless-stopped
    networks:
      - internal

  frontend:
    build:
      context: ./vue
      dockerfile: Dockerfile
    expose:
      - "80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - internal

volumes:
  roseboom-data:
    name: roseboom-data
  roseboom-uploads:
    name: roseboom-uploads

networks:
  internal:
